# JMX Prometheus Javaagent configuration
# Export all JMX metrics
---
lowercaseOutputName: true
lowercaseOutputLabelNames: true

whitelistObjectNames:
  - "java.lang:type=Memory"
  - "java.lang:type=GarbageCollector,*"
  - "java.lang:type=Threading"
  - "java.lang:type=ClassLoading"
  - "java.lang:type=OperatingSystem"
  - "Catalina:type=ThreadPool,*"
  - "Catalina:type=GlobalRequestProcessor,*"
  - "Catalina:type=Manager,*"

rules:
  # JVM Memory
  - pattern: "java.lang<type=Memory><HeapMemoryUsage>(.+): (.+)"
    name: jvm_memory_heap_$1
    value: $2
    type: GAUGE

  # JVM Garbage Collector
  - pattern: "java.lang<type=GarbageCollector, name=(.+)><>(.+): (.+)"
    name: jvm_gc_$2
    labels:
      gc: "$1"
    value: $3
    type: GAUGE

  # JVM Threads
  - pattern: "java.lang<type=Threading><>(.+): (.+)"
    name: jvm_threads_$1
    value: $2
    type: GAUGE

  # Tomcat Thread Pool
  - pattern: 'Catalina<type=ThreadPool, name="(.+)"><>(currentThreadCount|currentThreadsBusy|maxThreads|connectionCount): (.+)'
    name: tomcat_threadpool_$2
    labels:
      pool: "$1"
    value: $3
    type: GAUGE

  # Tomcat Requests
  - pattern: 'Catalina<type=GlobalRequestProcessor, name="(.+)"><>(requestCount|errorCount|bytesReceived|bytesSent|processingTime|maxTime): (.+)'
    name: tomcat_requestprocessor_$2
    labels:
      connector: "$1"
    value: $3
    type: COUNTER

  # Tomcat Sessions
  - pattern: 'Catalina<type=Manager, host=(.+), context=(.+)><>(activeSessions|sessionCounter|expiredSessions|rejectedSessions|maxActive): (.+)'
    name: tomcat_sessions_$3
    labels:
      host: "$1"
      context: "$2"
    value: $4
    type: GAUGE

  # Everything else
  - pattern: ".*"